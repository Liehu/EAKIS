# 统一的搜索引擎配置文件
# 支持两种模式：API（直接调用搜索引擎API）和 CDP（使用浏览器自动化）

engines:
  # 普通搜索引擎（支持 API 和 CDP 两种模式）
  web_engines:
    baidu:
      display_name: "百度搜索"
      description: "中国最大的搜索引擎"

      # 基础配置（API 和 CDP 通用）
      base:
        search_url: "https://www.baidu.com/s"
        query_param: "wd"
        auth_type: "none"

        # 搜索语法字段
        fields:
          site: "site:{value}"
          title: "intitle:\"{value}\""
          exact: "\"{value}\""
          inurl: "inurl:\"{value}\""
        operators: [" ", "AND", "OR", "-"]

      # API 模式配置
      api:
        enabled: true
        request_timeout: 30
        rate_limit: 1.0
        max_results: 100
        pagination:
          param: pn
          size_param: rn
          default_size: 10
        response_path: "html"
        notes: "百度支持的基础语法及组合应用说明..."

      # CDP 模式配置
      cdp:
        enabled: true
        result_selector: ".result"
        title_selector: "h3 a"
        link_selector: "h3 a"
        snippet_selector: ".c-abstract"
        load_timeout: 30
        wait_for_selector: ".result"

      # 通用设置
      settings:
        priority: 1
        category: "general_search"
        supported_languages: ["zh-CN", "zh"]

    bing:
      display_name: "必应搜索"
      description: "微软搜索引擎"

      base:
        search_url: "https://www.bing.com/search"
        query_param: "q"
        auth_type: "none"

        fields:
          site: "site:{value}"
          title: "intitle:\"{value}\""
          inurl: "inurl:\"{value}\""
          filetype: "filetype:{value}"
          body: "inbody:{value}"
        operators: ["AND", "OR", "NOT", "+", "-"]

      api:
        enabled: true
        request_timeout: 30
        rate_limit: 1.0
        max_results: 50
        pagination:
          param: first
          size_param: count
          default_size: 10
        response_path: "html"

      cdp:
        enabled: true
        result_selector: ".b_algo"
        title_selector: "h2 a"
        link_selector: "h2 a"
        snippet_selector: ".b_caption p"
        load_timeout: 30
        wait_for_selector: "#b_results"

      settings:
        priority: 1
        category: "general_search"
        supported_languages: ["en", "zh-CN"]

    google:
      display_name: "谷歌搜索"
      description: "全球最大的搜索引擎"

      base:
        search_url: "https://www.google.com/search"
        query_param: "q"
        auth_type: "none"

        fields:
          site: "site:{value}"
          title: "intitle:\"{value}\""
          inurl: "inurl:\"{value}\""
          filetype: "filetype:{value}"
        operators: [" "]

      api:
        enabled: false  # 谷歌需要特殊处理或 API Key
        request_timeout: 30
        rate_limit: 2.0
        max_results: 10

      cdp:
        enabled: true
        result_selector: ".g"
        title_selector: "h3"
        link_selector: "h3 a"
        snippet_selector: ".VwiC3b"
        load_timeout: 30
        wait_for_selector: "#search"

      settings:
        priority: 2
        category: "general_search"
        supported_languages: ["en", "zh-CN", "zh"]

    sogou:
      display_name: "搜狗搜索"
      description: "中文搜索引擎"

      base:
        search_url: "https://www.sogou.com/web"
        query_param: "query"
        auth_type: "none"

        fields:
          site: "site:{value}"
          title: "intitle:\"{value}\""
        operators: [" "]

      api:
        enabled: false
        request_timeout: 30

      cdp:
        enabled: true
        result_selector: ".vrwrap"
        title_selector: "h3 a"
        link_selector: "h3 a"
        snippet_selector: ".ft"
        load_timeout: 30
        wait_for_selector: ".results"

      settings:
        priority: 3
        category: "general_search"
        supported_languages: ["zh-CN"]

  # 专业情报搜索引擎（主要使用 API，部分支持 CDP）
  intelligence_engines:
    fofa:
      display_name: "FOFA"
      description: "网络空间搜索引擎"

      base:
        search_url: "https://fofa.info/api/v1/search/all"
        query_param: "qbase64"
        auth_type: "email+apikey"
        query_encoding: "base64"

        # FOFA 专用字段
        fields:
          domain: 'domain="{value}"'
          host: 'host="{value}"'
          ip: 'ip="{value}"'
          port: 'port="{value}"'
          protocol: 'protocol="{value}"'
          server: 'server="{value}"'
          title: 'title="{value}"'
          body: 'body="{value}"'
          header: 'header="{value}"'
          cert: 'cert="{value}"'
          status_code: 'status_code="{value}"'
          icon_hash: 'icon_hash="{value}"'
          app: 'app="{value}"'
          os: 'os="{value}"'
          country: 'country="{value}"'
          city: 'city="{value}"'
          region: 'region="{value}"'
          asn: 'asn="{value}"'
          org: 'org="{value}"'
          after: 'after="{value}"'
          before: 'before="{value}"'
        operators: ["=", "==", "!=", "&&", "||", "()"]

      api:
        enabled: true
        api_key: ""
        email: ""
        max_results: 100
        request_timeout: 30
        rate_limit: 1.0
        pagination:
          param: page
          size_param: size
          default_size: 100
        response_path: "results"
        notes: "FOFA支持的检索字段与运算符使用说明..."

      cdp:
        enabled: false  # FOFA 主要使用 API
        result_selector: ".result-item"
        title_selector: ".title"
        link_selector: ".title a"
        snippet_selector: ".description"

      settings:
        priority: 1
        category: "intelligence"
        required_auth: true

    hunter:
      display_name: "奇安信Hunter"
      description: "网络空间搜索引擎"

      base:
        search_url: "https://hunter.qianxin.com/open/api/search"
        query_param: "query"
        auth_type: "apikey"
        query_encoding: "plain"

        fields:
          web_title: 'web.title="{value}"'
          web_body: 'web.body="{value}"'
          web_icon: 'web.icon="{value}"'
          web_icon_md5: 'web.icon=="{value}"'
          web_header: 'web.header="{value}"'
          web_status_code: 'web.status_code="{value}"'
          web_server: 'web.server="{value}"'
          web_framework: 'web.framework="{value}"'
          ip: 'ip="{value}"'
          port: 'port="{value}"'
          domain: 'domain="{value}"'
          host: 'host="{value}"'
          country: 'country="{value}"'
          province: 'province="{value}"'
          city: 'city="{value}"'
          icp: 'icp.name="{value}"'
          icp_number: 'icp.number="{value}"'
          cert: 'cert="{value}"'
          cert_subject: 'cert.subject="{value}"'
          cert_issuer: 'cert.issuer="{value}"'
          cert_serial: 'cert.serial="{value}"'
          os: 'os="{value}"'
          device: 'device="{value}"'
          asn: 'asn="{value}"'
          isp: 'isp="{value}"'
          after: 'after="{value}"'
          before: 'before="{value}"'
          app: 'app="{value}"'
        operators: ["=", "==", "&&", "||", "()", "!"]

      api:
        enabled: true
        api_key: ""
        max_results: 100
        request_timeout: 30
        rate_limit: 0.5
        pagination:
          param: page
          size_param: size
          default_size: 20
        response_path: "data.assets"
        notes: "奇安信Hunter语法使用说明..."

      cdp:
        enabled: false

      settings:
        priority: 1
        category: "intelligence"
        required_auth: true

# 全局配置
global:
  # 默认搜索模式
  default_mode: "api"  # 可选： "api" 或 "cdp"

  # CDP 全局配置
  cdp:
    enabled: false
    max_pages: 5
    timeout: 30
    headless: true
    launch_args:
      - "--disable-blink-features=AutomationControlled"
      - "--disable-dev-shm-usage"
      - "--no-sandbox"
      - "--disable-gpu"

  # API 全局配置
  api:
    default_timeout: 30
    default_rate_limit: 1.0
    retry_attempts: 3
    retry_backoff: 2.0

  # 反爬策略
  anti_crawl:
    delay_range: [1.5, 4.0]
    random_wait: true
    max_fallback_attempts: 2
    failure_types:
      - timeout
      - navigation_error
      - empty_results
      - rate_limit