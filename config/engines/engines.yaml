engines:
  fofa:
    display_name: Fofa
    search_url: https://fofa.info/api/v1/search/all
    auth_type: email+apikey
    query_param: qbase64
    query_encoding: base64
    fields:
      domain: domain="{value}"
      host: host="{value}"
      ip: ip="{value}"
      port: port="{value}"
      protocol: protocol="{value}"
      server: server="{value}"
      title: title="{value}"
      body: body="{value}"
      header: header="{value}"
      banner: banner="{value}"
      cert: cert="{value}"
      status_code: status_code="{value}"
      icon_hash: icon_hash="{value}"
      app: app="{value}"
      os: os="{value}"
      country: country="{value}"
      city: city="{value}"
      region: region="{value}"
      asn: asn="{value}"
      org: org="{value}"
      base_protocol: base_protocol="{value}"
      after: after="{value}"
      before: before="{value}"
      is_ipv6: is_ipv6={value}
      is_domain: is_domain={value}
      ip_ports: ip_ports="{value}"
      port_size: port_size="{value}"
      port_size_gt: port_size_gt="{value}"
      port_size_lt: port_size_lt="{value}"
      icp: icp="{value}"
    operators:
    - '='
    - ==
    - '!='
    - '&&'
    - '||'
    - ()
    pagination:
      param: page
      size_param: size
      default_size: 100
    response_path: results
    rate_limit: 1.0
    notes: 'FOFA支持的检索字段与运算符使用说明[citation:4][citation:10]：


      **核心检索字段**：

      - 标题：`title="后台"` - 搜索页面标题包含指定词的资产

      - 正文：`body="管理后台"` - 搜索HTML正文中包含指定内容的资产

      - 响应头：`header="thinkphp"` - 搜索HTTP响应头包含指定字段的资产

      - 证书：`cert="google"` - 搜索SSL证书中包含指定字符串的资产

      - 域名：`domain="163.com"` - 搜索子域名包含指定域名的网站

      - 主机：`host=".gov.cn"` - 从域名中搜索指定后缀

      - IP地址：`ip="1.1.1.1"` / `ip="120.27.6.1/24"` - 支持单IP或CIDR段

      - 端口：`port="3306"` - 搜索指定端口

      - 协议：`protocol="https"` - 搜索特定协议资产

      - 服务器：`server="Apache"` - 搜索特定Web服务器

      - 操作系统：`os="windows"` - 搜索特定操作系统资产

      - 应用指纹：`app="TDXK-通达OA"` - 搜索指定应用/设备

      - 状态码：`status_code="200"` - 查询HTTP响应状态码

      - Icon Hash：`icon_hash="-247388890"` - 搜索使用相同图标的资产


      **地理位置与网络信息**：

      - 国家：`country="CN"` - 按国家代码或名称搜索

      - 城市：`city="Shanghai"` - 按城市名称搜索

      - 区域：`region="Zhejiang"` - 按省级行政区搜索

      - ASN：`asn="19551"` - 按自治域号码搜索

      - 组织：`org="Amazon.com, Inc."` - 按IP所属组织搜索


      **时间范围**：

      - `after="2017"` - 搜索指定时间之后发现的资产

      - `before="2019-07-01"` - 搜索指定时间之前发现的资产


      **备案信息**：

      - `icp="京ICP证xxxx号"` - 按ICP备案号搜索资产，用于企业资产归属定位[citation:10]


      **逻辑运算符**：

      - `=`：模糊匹配

      - `==`：精确匹配（严格匹配）

      - `!=`：不匹配/排除

      - `&&`：逻辑与（AND）

      - `||`：逻辑或（OR）

      - `()`：优先级分组


      **组合示例**：`app="TDXK-通达OA" && org="China Education and Research Network Center"`[citation:4]


      **Tips**：

      - 支持`ip_ports="3306,443,22"`搜索同时开放多个端口的IP

      - 支持`port_size_gt="3"`筛选开放端口数量大于N的资产

      - `icon_hash`常用于追踪使用相同favicon的关联资产（如测试后台、分公司站点）[citation:5]

      '
    api_key: ''
    email: ''
    enabled: false
    max_results: 100
    request_timeout: 30
  hunter:
    display_name: 奇安信Hunter
    search_url: https://hunter.qianxin.com/open/api/search
    auth_type: apikey
    query_param: query
    query_encoding: plain
    fields:
      web_title: web.title="{value}"
      web_body: web.body="{value}"
      web_icon: web.icon="{value}"
      web_icon_md5: web.icon=="{value}"
      web_header: web.header="{value}"
      web_status_code: web.status_code="{value}"
      web_server: web.server="{value}"
      web_framework: web.framework="{value}"
      ip: ip="{value}"
      port: port="{value}"
      domain: domain="{value}"
      host: host="{value}"
      country: country="{value}"
      province: province="{value}"
      city: city="{value}"
      icp: icp.name="{value}"
      icp_number: icp.number="{value}"
      cert: cert="{value}"
      cert_subject: cert.subject="{value}"
      cert_issuer: cert.issuer="{value}"
      cert_serial: cert.serial="{value}"
      os: os="{value}"
      device: device="{value}"
      asn: asn="{value}"
      isp: isp="{value}"
      after: after="{value}"
      before: before="{value}"
      app: app="{value}"
    operators:
    - '='
    - ==
    - '&&'
    - '||'
    - ()
    - '!'
    pagination:
      param: page
      size_param: size
      default_size: 20
    response_path: data.assets
    rate_limit: 0.5
    notes: '奇安信Hunter语法使用说明[citation:5]：


      **Web内容字段**[citation:5]：

      - `web.title="管理后台"` - 网站标题

      - `web.body="登录"` - HTML正文内容

      - `web.header="Server: nginx"` - HTTP响应头

      - `web.icon="11ecefc82fe25f741ea3b7c30b922bdc"` - 图标MD5哈希（格式为32位十六进制）

      - `web.icon=="11ecefc82fe25f741ea3b7c30b922bdc"` - 精确匹配图标MD5


      **状态码与指纹**：

      - `web.status_code="200"` - HTTP状态码

      - `web.server="Tomcat"` - Web服务器类型

      - `web.framework="Spring"` - Web框架标识


      **地理位置与网络**：

      - `country="CN"` - 国家

      - `province="beijing"` - 省份

      - `city="shanghai"` - 城市

      - `isp="China Telecom"` - 网络服务商

      - `asn="4134"` - 自治域号


      **备案与企业信息（核心差异化功能）**[citation:5]：

      - `icp.name="上汽大通"` - 搜索企业所有备案域名（按备案主体名称）

      - `icp.number="京ICP证xxxx号"` - 按ICP备案号精确查询


      **证书字段**：

      - `cert="example.com"` - 证书中包含的字符串

      - `cert.subject="CN=example.com"` - 证书主题

      - `cert.issuer="Let''s Encrypt"` - 证书颁发者


      **高级组合示例**[citation:5]：

      - 企业资产定位：`icp.name="上汽集团" && (web.body="登录" || web.body="注册")`

      - 图标追踪：`web.icon=="11ecefc82fe25f741ea3b7c30b922bdc"` - 发现使用同一Logo的隐藏IP/域名（测试后台、分公司站点）


      **资产详情功能**：支持查看IP/域名基础数据、服务指纹（如Tomcat 8.5.35）、网站框架/数据库信息[citation:5]


      **Tips**：

      - `web.icon`使用MD5哈希值（32位十六进制），可通过计算目标网站favicon.ico获得

      - ICP备案是企业资产收集的关键入口，可覆盖90%攻击面[citation:5]

      '
    api_key: ''
    email: ''
    enabled: false
    max_results: 100
    request_timeout: 30
  baidu:
    display_name: 百度
    search_url: https://www.baidu.com/s
    auth_type: none
    query_param: wd
    query_encoding: plain
    fields:
      title: intitle="{value}"
      url: inurl="{value}"
      site: site="{value}"
      filetype: filetype="{value}"
    operators:
    - 空格(AND)
    - '-'
    - ()
    pagination:
      param: pn
      size_param: rn
      default_size: 10
    response_path: html
    rate_limit: 1.0
    notes: "百度支持的基础语法及组合应用说明如下：\n- 关键字：直接输入即可，默认词间为“与”(AND)关系。\n- 短语精确搜索：使用双引号 `\"\
      \"` 包裹，如 `\"精确短语\"` [citation:1][citation:9]。\n- 站点搜索 (site)：将搜索范围限定在特定站点或域名，语法为\
      \ `关键词 site:域名`，`site:` 前需有空格，且域名不包含 `http://`，如 `人工智能 site:tsinghua.edu.cn`\
      \ [citation:3][citation:8][citation:9]。\n- 文件类型 (filetype)：搜索特定格式的文件，语法为 `关键词\
      \ filetype:扩展名`，如 `深度学习 filetype:pdf` [citation:3][citation:8]。\n- 逻辑操作：\n \
      \   - “与”(AND)：使用空格连接多个关键词，如 `大数据 技术`。\n    - “或”(OR)：百度高级搜索界面支持，或使用 `|` 符号，如\
      \ `神经网络 | 深度学习`。\n    - “非”(NOT)：使用减号 `-` 排除包含特定词的结果，注意减号前必须有空格，如 `区块链 -比特币`\
      \ [citation:1][citation:9]。\n- 标题/URL限定：\n    - `intitle:`：限定搜索结果的标题中包含指定关键词，如\
      \ `intitle:后台登录` [citation:3][citation:8]。\n    - `inurl:`：限定搜索结果的URL中包含指定关键词，如\
      \ `inurl:login` [citation:3][citation:8]。\n- 时间范围：百度无明确的 `after:` 或 `before:`\
      \ 语法，需在搜索结果页使用“时间筛选”工具 [citation:4]。\n"
    api_key: ''
    email: ''
    enabled: false
    max_results: 100
    request_timeout: 30
  bing:
    display_name: Bing
    search_url: https://www.bing.com/search
    auth_type: none
    query_param: q
    query_encoding: plain
    fields:
      title: intitle:{value}
      url: inurl:{value}
      site: site:{value}
      filetype: filetype:{value}
      body: inbody:{value}
    operators:
    - AND
    - OR
    - NOT
    - ()
    - +
    - '-'
    pagination:
      param: first
      size_param: count
      default_size: 10
    response_path: html
    rate_limit: 1.0
    notes: "Bing的高级搜索运算符功能强大，与Google类似。详细说明如下：\n- 关键字：直接输入。\n- 短语精确搜索：使用双引号 `\"\"\
      ` 进行强制短语匹配，如 `\"machine learning basics\"` [citation:2][citation:6][citation:10]。\n\
      - 站点搜索 (site)：搜索特定网站内的内容，如 `AI site:gov.cn` [citation:2][citation:10]。\n- 文件类型\
      \ (filetype)：限定返回的文件格式，如 `filetype:pdf 机器学习综述` [citation:2][citation:10]。\n\
      - 逻辑操作：\n    - “与”(AND)：默认空格即为AND。也可使用 `AND`、`&` 或 `&&`，如 `AI AND ethics` [citation:10]。\n\
      \    - “或”(OR)：连接同义词或备选项，使用 `OR`、`|` 或 `||`，如 `(神经网络 OR 深度学习) 应用` [citation:10]。\n\
      \    - “非”(NOT)：排除特定词，使用 `NOT` 或 `-`，如 `区块链 -加密货币`，`NOT`前需有空格 [citation:2][citation:6][citation:10]。\n\
      - 时间范围：支持 `after:` 和 `before:` 运算符，语法为 `关键词 after:YYYY-MM-DD before:YYYY-MM-DD`，例如\
      \ `新冠疫苗 after:2021-01-01 before:2021-12-31`。也支持 `date:` 范围参数，如 `AI date:2022..2023`\
      \ [citation:2][citation:4]。\n- 标题/URL/正文限定：\n    - `intitle:`：查询词出现在页面标题中，如\
      \ `intitle:\"隐私政策\"` [citation:10]。\n    - `inurl:`：查询词出现在URL中，如 `inurl:docs/api`\
      \ [citation:4]。\n    - `inbody:`：查询词出现在页面主体内容中 [citation:10]。\n- 其他高级指令：\n \
      \   - `near:n`：查找两个关键词之间相隔不超过n个单词的页面，如 `\"ipad\" near:5 \"apple\"` [citation:10]。\n\
      \    - `hasfeed:`：查找网站中包含RSS或Atom feed的页面，如 `hasfeed:blog site:microsoft.com`\
      \ [citation:10]。\n"
    api_key: ''
    email: ''
    enabled: false
    max_results: 100
    request_timeout: 30
